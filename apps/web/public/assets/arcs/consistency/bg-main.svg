<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1220"/>
      <stop offset="40%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect x="0" y="0" width="1920" height="400" fill="url(#accent)"/>
  <!-- Manga-style diagonal speed lines -->
  <line x1="100" y1="0" x2="300" y2="1080" stroke="rgba(59,130,246,0.05)" stroke-width="2"/>
  <line x1="400" y1="0" x2="600" y2="1080" stroke="rgba(59,130,246,0.04)" stroke-width="1.5"/>
  <line x1="700" y1="0" x2="900" y2="1080" stroke="rgba(59,130,246,0.03)" stroke-width="1"/>
  <line x1="1200" y1="0" x2="1400" y2="1080" stroke="rgba(59,130,246,0.04)" stroke-width="1.5"/>
  <line x1="1500" y1="0" x2="1700" y2="1080" stroke="rgba(59,130,246,0.05)" stroke-width="2"/>
</svg>
