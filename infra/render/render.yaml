services:
  - type: web
    name: arc-tracker
    runtime: node
    plan: free
    buildCommand: |
      corepack enable &&
      NODE_ENV=development pnpm install --frozen-lockfile &&
      pnpm -r build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "10000"
