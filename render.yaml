services:
  - type: web
    name: arc-tracker
    runtime: node
    plan: free
    buildCommand: |
      corepack enable &&
      NODE_ENV=development pnpm install --frozen-lockfile &&
      pnpm -r build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "10000"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://arc-tracker-sb5c.onrender.com
